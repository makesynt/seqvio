name: Release

on:
  push:
    branches: [main]

# Only one release run at a time; do NOT cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # push the "Version Packages" commit and git tags
  pull-requests: write  # open / update the version PR

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # changesets needs full history to compute changed packages.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      # TEMP DEBUG — compares the CI token fingerprint with the local one and
      # checks what the token can actually do. Remove after diagnosis.
      - name: Debug npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node -e "
            const t = process.env.NPM_TOKEN || '';
            const c = require('crypto');
            console.log('raw length:', t.length);
            console.log('trimmed length:', t.trim().length);
            console.log('sha256(raw) first16:', c.createHash('sha256').update(t).digest('hex').slice(0,16));
            console.log('sha256(trim) first16:', c.createHash('sha256').update(t.trim()).digest('hex').slice(0,16));
            console.log('prefix:', t.slice(0,12) + '...');
          "
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
          echo "--- whoami ---"; npm whoami || echo "whoami FAILED"
          echo "--- access (presentation) ---"; npm access list collaborators @seqvio/presentation 2>&1 || echo "access check FAILED"

      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          # When changesets exist: open/update a "Version Packages" PR.
          version: npm run version
          # When versions are already bumped (PR merged): build + publish.
          publish: npm run release
          # Tag each published version and create a matching GitHub Release
          # whose notes come from the package changelog.
          createGithubReleases: true
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
