name: Release

on:
  push:
    branches: [main]

# Only one release run at a time; do NOT cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # push the "Version Packages" commit and git tags
  pull-requests: write  # open / update the version PR
  id-token: write       # npm provenance (OIDC)

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # changesets needs full history to compute changed packages.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          # When changesets exist: open/update a "Version Packages" PR.
          version: npm run version
          # When versions are already bumped (PR merged): build + publish.
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
